name: quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install quality dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          python -m pip install ruff==0.15.0 requests pillow httpx tqdm
      - name: Check shell syntax
        run: bash -n scripts/*.sh jobs/*.sbatch data_generation/*.sh training/*.sh grpo/*.sh
      - name: Lint Python
        run: ruff check src scripts tests data_generation grpo
      - name: Check Python syntax
        run: python -m py_compile src/*.py scripts/*.py tests/*.py data_generation/*.py grpo/*.py
      - name: Run offline tests
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Scan tracked files for likely secrets
        run: bash scripts/secret_scan.sh
      - name: Check whitespace errors
        run: git diff --check HEAD
