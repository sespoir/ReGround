### Model
# Replace this temporary path with the local Qwen2.5-VL-7B-Instruct directory.
model_name_or_path: /tmp/reground/models/Qwen2.5-VL-7B-Instruct
template: qwen2_vl
trust_remote_code: true

### Training method
stage: sft
do_train: true
finetuning_type: full
deepspeed: training/ds_z3_config.json

### Dataset
dataset: reground_sft
dataset_dir: /tmp/reground/data
cutoff_len: 8192
train_on_prompt: false
mask_history: false
val_size: 0.02
remove_unused_columns: false
preprocessing_num_workers: 8
dataloader_num_workers: 4

### Output
output_dir: /tmp/reground/outputs/qwen2.5-vl-7b-sft
logging_steps: 10
save_strategy: epoch
save_total_limit: 3
save_only_model: true
save_safetensors: true
eval_strategy: epoch
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
report_to: none

### Optimization
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 6
learning_rate: 8.0e-6
num_train_epochs: 2.5
lr_scheduler_type: cosine
warmup_ratio: 0.05
weight_decay: 0.1
max_grad_norm: 1.0
bf16: true
gradient_checkpointing: true

### Distributed training
ddp_timeout: 180000000
